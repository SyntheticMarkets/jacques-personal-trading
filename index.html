<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Deriv Trader UI</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="phone">
      <header class="topbar">
        <div id="accountSummary" class="account-summary">
          <span class="acct-label">Log in</span>
        </div>
        <div class="status" id="status">Connecting...</div>
      </header>

      <div id="accountPanel" class="account-panel hidden">
        <div class="account-tabs">
          <button class="pill active">Real</button>
          <button class="pill">Demo</button>
        </div>
        <div id="accountList" class="account-list"></div>
        <button id="logoutBtn" class="ghost small account-manage">Logout</button>
      </div>

      <nav class="app-tabs" role="tablist" aria-label="App screens">
        <button class="app-tab active" data-app-tab="settings" role="tab" aria-selected="true">Settings</button>
        <button class="app-tab" data-app-tab="chart" role="tab" aria-selected="false">Chart</button>
        <button class="app-tab" data-app-tab="results" role="tab" aria-selected="false">Results</button>
        <button class="app-tab" data-app-tab="chart_2" role="tab" aria-selected="false">Chart 2</button>
        <button class="app-tab" data-app-tab="auto" role="tab" aria-selected="false">Auto</button>
      </nav>

      <section class="app-panel active" data-app-panel="settings">
      <nav class="trade-tabs" role="tablist">
        <button class="tab active" data-tab="rise_fall" role="tab" aria-selected="true">Rise/Fall</button>
        <button class="tab" data-tab="higher_lower" role="tab" aria-selected="false">Higher/Lower</button>
      </nav>

      <section class="symbol-row">
        <div class="symbol-icon"></div>
        <div class="symbol-info">
          <div class="symbol-name" id="symbolName">--</div>
          <div class="symbol-price" id="symbolPrice">--</div>
        </div>
        <div class="symbol-select">
          <select id="marketSelect" aria-label="Market"></select>
          <select id="symbolSelect" aria-label="Symbol"></select>
        </div>
      </section>

      <section class="card">
        <header class="card-head">
          <h2>Set your trade</h2>
          <button id="toggleTrade" class="ghost small" aria-expanded="true">Collapse</button>
        </header>

        <div id="tradeBody" class="trade-body">
          <div id="quickRow" class="quick-row">
            <button class="pill" id="btn1m">1 min</button>
            <button class="pill" id="btn2m">2 min</button>
          </div>

          <div id="barrierField" class="field">
            <div class="field-label">Barrier offset</div>
            <input id="barrierInput" class="field-input" type="number" min="0.0001" step="0.0001" value="0.5" />
          </div>

          <div class="field">
            <div class="field-label">Stake</div>
            <input id="stakeInput" class="field-input" type="number" min="0.35" step="0.01" value="1" />
          </div>
        </div>
      </section>
      </section>

      <section class="app-panel" data-app-panel="chart" hidden>
      <section class="card trade-section">
        <header class="card-head">
          <h2 id="signalSectionTitle">Signal</h2>
          <button id="toggleSignal" class="ghost small" aria-expanded="true">Collapse</button>
        </header>
        <div id="signalBody" class="signal-grid">
          <div class="signal-item">
            <div class="field-label">Trend</div>
            <div id="sigTrend" class="field-value">--</div>
          </div>
          <div class="signal-item">
            <div class="field-label">Divergence</div>
            <div id="sigDiv" class="field-value">--</div>
          </div>
          <div class="signal-item">
            <div class="field-label">Sweep</div>
            <div id="sigSweep" class="field-value">--</div>
          </div>
          <div class="signal-item">
            <div class="field-label">Confidence</div>
            <div id="sigConf" class="field-value">--</div>
          </div>
          <div class="signal-item">
            <div class="field-label">Signal</div>
            <div id="sigSignal" class="field-value">--</div>
          </div>
          <div class="signal-item">
            <div class="field-label">Rejection</div>
            <div id="sigReject" class="field-value">--</div>
          </div>
          <div class="signal-item">
            <div class="field-label">Entry</div>
            <div id="sigEntry" class="field-value">--</div>
          </div>
          <div class="signal-item">
            <div class="field-label">Level</div>
            <div id="sigLevel" class="field-value">--</div>
          </div>
          <div class="signal-item">
            <div class="field-label">Blue Candles</div>
            <div id="sigBlue" class="field-value">--</div>
          </div>
          <div class="signal-item">
            <div class="field-label">White Candles</div>
            <div id="sigWhite" class="field-value">--</div>
          </div>
          <div class="signal-item">
            <div class="field-label">Last Update</div>
            <div id="sigTime" class="field-value">--</div>
          </div>
        </div>
        <div class="card-head signal-chart-head">
          <div class="signal-chart-meta">
            <select id="trendModeSelect" class="field-input chart-mode-select" aria-label="Trend mode">
              <option value="EMA">EMA Trend</option>
              <option value="AVG">AVG Trend</option>
              <option value="OBV">OBV Trend</option>
              <option value="STACK">Stack Trend</option>
            </select>
          </div>
          <div class="chart-controls">
            <button id="resetChart" class="ghost small chart-reset-btn" type="button" aria-label="Reset chart to current candle">↺</button>
            <button id="zoomOut" class="ghost small" type="button">-</button>
            <button id="zoomIn" class="ghost small" type="button">+</button>
            <button id="toggleChart" class="ghost small" aria-expanded="true">Collapse</button>
          </div>
        </div>
        <div id="chartBody" class="chart-body">
          <div id="chartTfPicker" class="chart-tf-picker hidden">
            <select id="chartTfSelect" class="field-input" aria-label="Chart timeframe"></select>
          </div>
          <canvas id="miniChart" aria-label="Mini chart"></canvas>
          <div class="chart-footer">
            <div class="chart-footer-group">
              <span class="chart-footer-label">Timeframe</span>
              <button id="chartTfLabel" class="chart-tf-label signal-tf-label chart-tf-trigger" type="button" aria-label="Change chart timeframe">1m</button>
            </div>
            <div class="chart-footer-group chart-footer-group-right">
              <select id="indicatorSelect" class="field-input chart-indicator-select" aria-label="Add chart indicator"></select>
            </div>
          </div>
          <div id="chartIndicatorList" class="chart-indicator-list"></div>
        </div>
      </section>

      <section class="card trade-section chart2-hide">
        <header class="card-head">
          <h2>Trade proposals</h2>
          <button id="toggleProposals" class="ghost small" aria-expanded="true">Collapse</button>
        </header>
        <div id="hlButtons" class="hl-buttons proposal-direction" role="group" aria-label="Higher or Lower">
          <button class="pill active">Higher</button>
          <button class="pill">Lower</button>
        </div>
        <div id="tradeList" class="trade-list"></div>
      </section>
      </section>

      <section class="app-panel" data-app-panel="results" hidden>
      <section class="card trade-section">
        <header class="card-head">
          <h2>Trade results</h2>
          <button id="toggleResults" class="ghost small" aria-expanded="true">Collapse</button>
        </header>
        <div id="tradeResults" class="trade-list"></div>
      </section>
      </section>

      <section class="app-panel" data-app-panel="auto" hidden>
      <section class="card trade-section">
        <header class="card-head">
          <h2>Auto trade</h2>
          <button id="toggleAuto" class="ghost small" aria-expanded="true">Collapse</button>
        </header>
        <div id="autoSection" class="auto-section">
          <div class="auto-subsection">
            <div class="card-head auto-subhead">
              <h3>Auto trade</h3>
              <button id="toggleAutoConfig" class="ghost small" aria-expanded="true">Collapse</button>
            </div>
            <div id="autoBody" class="auto-row">
              <label class="auto-toggle">
                <input id="autoToggle" type="checkbox" />
                <span>Enable auto trade</span>
              </label>
              <select id="autoAccountSelect" class="field-input">
                <option value="">Select account</option>
              </select>
            </div>
          </div>
          <div class="auto-subsection">
            <div class="card-head auto-subhead">
              <h3>Auto trade results</h3>
              <button id="toggleAutoResults" class="ghost small" aria-expanded="true">Collapse</button>
            </div>
            <div id="autoResults" class="trade-list auto-results-list"></div>
          </div>
        </div>
      </section>
      </section>

    </main>

    <script src="app.js"></script>
  </body>
</html>
